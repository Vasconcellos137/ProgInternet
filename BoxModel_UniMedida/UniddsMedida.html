<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Laboratório de Unidades CSS</title>
    <link rel="stylesheet" href="chatEx.css">

</head>

<body>

    <!-- 1. % -->
    <div class="pai">
        Elemento Pai = 500px
        <div class="filho">
            Filho = 50% do pai
        </div>
    </div>

    <!-- 2. REM -->
    <div class="rem-exemplo">
        Texto com 2rem - base no valor de :root
    </div>

    <!-- 3. EM -->
    <div class="em-pai">
        Pai (20px)
        <div class="em-filho">
            Filho (2em = 40px)
        </div>
    </div>

    <!-- 4. VH / VW -->
    <div class="tela">
        50vh x 50vw
    </div>

    <!-- 5. PX -->
    <div class="px">
        Tamanho fixo em px
    </div>

    <!-- 6. Responsivo -->
    <div class="responsivo">
        Esse bloco cresce até 400px no máximo
    </div>

</body>

</html>
